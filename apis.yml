aid: melio
name: Melio
description: >-
  Melio is a B2B payments platform for small businesses that provides a REST API
  for managing bills, vendors, payment methods, scheduling payments, and syncing
  with accounting software including QuickBooks, Xero, and NetSuite. Melio
  enables software companies to embed bill pay, vendor payments, and invoicing
  directly inside their products with ACH and card options. Founded in 2018,
  Melio has processed over $100B in payments for 100,000+ business users and
  2M+ vendors.
